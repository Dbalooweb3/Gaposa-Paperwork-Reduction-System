services:
  - type: web
    name: gaposa-paperwork-reduction-system
    env: node
    buildCommand: "./build.sh"
    startCommand: "npm start"
    plan: free # Change to a higher plan if needed for Puppeteer performance
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gaposa-db
          property: connectionString

databases:
  - name: gaposa-db
    plan: free
